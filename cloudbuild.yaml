steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/cool-cruze-rental
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/cool-cruze-rental

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cool-cruze-rental
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/cool-cruze-rental
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$_CLOUD_SQL_INSTANCE
      - --set-env-vars=DATABASE_URL=$_DATABASE_URL
      - --set-env-vars=GCS_BUCKET_NAME=$_GCS_BUCKET_NAME
      - --set-env-vars=WHATSAPP_NUMBER=$_WHATSAPP_NUMBER
      - --set-env-vars=SENDGRID_API_KEY=$_SENDGRID_API_KEY
      - --set-env-vars=SENDER_EMAIL=$_SENDER_EMAIL
      - --set-env-vars=NOTIFY_EMAIL=$_NOTIFY_EMAIL
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5

substitutions:
  _REGION: asia-south1
  _CLOUD_SQL_INSTANCE: your-project:asia-south1:cool-cruze-db
  _DATABASE_URL: postgresql://coolcruze:password@localhost:5432/coolcruze?host=/cloudsql/your-project:asia-south1:cool-cruze-db
  _GCS_BUCKET_NAME: cool-cruze-uploads
  _WHATSAPP_NUMBER: "917977471369"
  _SENDGRID_API_KEY: your-sendgrid-key
  _SENDER_EMAIL: info@coolcruze.in
  _NOTIFY_EMAIL: coolbreezeair01@gmail.com